<!DOCTYPE html>
<html>
<head>
<title>Payment</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Secure Payment 💳</h2>

<form method="POST">

<label>Card Holder Name</label>
<input type="text" placeholder="Enter your name" required>

<label>Card Number</label>
<input type="text" placeholder="XXXX XXXX XXXX XXXX" required>

<label>Expiry Date</label>
<input type="month" required>

<label>CVV</label>
<input type="password" placeholder="***" required>

<label>Enter Amount</label>
<input type="number" name="amount" placeholder="Enter amount" required>

<br>

<label>Select Payment Method</label><br><br>

<input type="radio" name="method" value="UPI" required> UPI<br>
<input type="radio" name="method" value="Card"> Debit/Credit Card<br>
<input type="radio" name="method" value="NetBanking"> Net Banking<br>

<br><br>

<button type="submit">Pay Now 🔒</button>

</form>

</div>

</body>
</html>
